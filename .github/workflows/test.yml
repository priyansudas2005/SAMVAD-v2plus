name: Tests

# Runs the full automated suite on every push and pull request.
# Binds to the upgraded SAMVAD V2.0 REST backend and React frontend compilation.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: pytest tests/test_api.py -v

  js-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Verify compilation build
        run: npm run build
